services:
  backend:
    build:
      context: ./src/back
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      - rabbitmq
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: telemetry_user
      POSTGRES_PASSWORD: telemetry_pass
      POSTGRES_DB: telemetry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  consumer:
    build:
      context: ./src/consumer
    container_name: consumer
    depends_on:
      - rabbitmq
      - postgres
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
  
  k6:
    image: grafana/k6:latest
    container_name: k6
    profiles: ["loadtest"]
    depends_on:
      - backend
    environment:
      BASE_URL: http://backend:8080
    volumes:
      - ./src/tests/loadtest:/scripts:ro
    entrypoint: ["k6", "run", "/scripts/telemetry_loadtest.js"]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

volumes:
  rabbitmq_data:
  postgres_data: